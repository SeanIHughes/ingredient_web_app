name: toxin_tracker
description: "Flutter version of Toxin Tracker"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # --- OUR CUSTOM TOOLS ---
  http: ^1.1.0                # To talk to your FastAPI main.py
  shared_preferences: ^2.5.5   # To save scan history (like UserDefaults)
  mobile_scanner: ^3.5.0       # The camera/barcode logic
  intl: ^0.18.1                # For date formatting
  cupertino_icons: ^1.0.8      # iOS-style icons

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true